<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Private Room • Advanced Chat</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-dark: #0a0a0a;
  --bg-darker: #050505;
  --bg-surface: #111111;
  --bg-surface-light: #1a1a1a;
  --accent: #25D366;
  --accent-dark: #075E54;
  --accent-blue: #34B7F1;
  --text-primary: #ffffff;
  --text-secondary: #a0a0a0;
  --text-muted: #6b6b6b;
  --border: #2a2a2a;
  --sent-msg: #005C4B;
  --received-msg: #1f2c34;
  --online: #25D366;
  --typing: #34B7F1;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
}

/* App Container */
.app-container {
  display: flex;
  height: 100vh;
  background: var(--bg-dark);
}

/* Sidebar (Chats List) */
.sidebar {
  width: 380px;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

/* Header */
.sidebar-header {
  padding: 16px 20px;
  background: var(--bg-surface-light);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo h1 {
  font-size: 20px;
  font-weight: 600;
  background: linear-gradient(135deg, #25D366, #128C7E);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.logo span {
  font-size: 12px;
  color: var(--text-secondary);
  display: block;
}

.header-actions {
  display: flex;
  gap: 16px;
}

.icon-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 20px;
  cursor: pointer;
  padding: 6px;
  transition: all 0.2s;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  display: flex;
align-items: center;
  justify-content: center;
}

.icon-btn:hover {
  background: rgba(255,255,255,0.1);
  color: var(--accent);
}

/* User Profile Bar */
.user-bar {
  padding: 12px 20px;
  background: var(--bg-surface-light);
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}

.avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, #25D366, #128C7E);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: bold;
  position: relative;
  cursor: pointer;
}

.avatar.online::after {
  content: '';
  position: absolute;
  bottom: 2px;
  right: 2px;
  width: 12px;
  height: 12px;
  background: var(--online);
  border-radius: 50%;
  border: 2px solid var(--bg-surface-light);
}

.user-info {
  flex: 1;
}

.user-name {
  font-weight: 600;
  font-size: 16px;
}

.user-status {
  font-size: 12px;
  color: var(--text-secondary);
}

.status-typing {
  color: var(--typing);
}

.user-actions {
  display: flex;
  gap: 8px;
}

/* Search Bar */
.search-bar {
  padding: 10px 16px;
  background: var(--bg-surface);
}

.search-container {
  background: var(--bg-dark);
  border-radius: 30px;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--border);
}

.search-container input {
  background: none;
  border: none;
  color: var(--text-primary);
  flex: 1;
  outline: none;
  font-size: 14px;
}

.search-container input::placeholder {
  color: var(--text-muted);
}

/* Chat List */
.chat-list {
  flex: 1;
  overflow-y: auto;
}

.chat-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  cursor: pointer;
  transition: all 0.2s;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.chat-item:hover {
  background: rgba(255,255,255,0.05);
}

.chat-item.active {
  background: rgba(37, 211, 102, 0.1);
}

.chat-avatar {
  position: relative;
}

.chat-avatar-img {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, #25D366, #075E54);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: bold;
}

.online-dot {
  position: absolute;
  bottom: 2px;
  right: 2px;
  width: 14px;
  height: 14px;
  background: var(--online);
  border-radius: 50%;
  border: 2px solid var(--bg-surface);
}

.chat-info {
  flex: 1;
}

.chat-name {
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 4px;
}

.chat-preview {
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  gap: 6px;
  align-items: center;
}

.chat-preview i {
  font-style: normal;
}

.chat-preview.typing {
  color: var(--typing);
}

.chat-meta {
  text-align: right;
}

.chat-time {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.unread-badge {
  background: var(--accent);
  color: white;
  font-size: 11px;
  font-weight: bold;
  min-width: 20px;
  height: 20px;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 6px;
}

.pinned-badge {
  color: var(--accent);
  font-size: 12px;
}

/* Main Chat Area */
.main-chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg-dark);
  position: relative;
}

.chat-header {
  padding: 12px 20px;
  background: var(--bg-surface-light);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
}

.back-btn {
  display: none;
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 24px;
  cursor: pointer;
}

.chat-header-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, #25D366, #075E54);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: bold;
  position: relative;
}

.chat-header-info {
  flex: 1;
}

.chat-header-name {
  font-weight: 600;
  font-size: 16px;
}

.chat-header-status {
  font-size: 12px;
  color: var(--text-secondary);
}

.typing-indicator {
  color: var(--typing);
}

.chat-header-actions {
  display: flex;
  gap: 12px;
}

/* Messages Area */
.messages-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background-image: radial-gradient(var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
}

.message {
  display: flex;
  max-width: 70%;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.sent {
  align-self: flex-end;
}

.message.received {
  align-self: flex-start;
}

.message-bubble {
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.5;
  position: relative;
  word-wrap: break-word;
}

.message.sent .message-bubble {
  background: var(--sent-msg);
  color: white;
  border-bottom-right-radius: 4px;
}

.message.received .message-bubble {
  background: var(--received-msg);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
}

.message-meta {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 4px;
  font-size: 10px;
  opacity: 0.7;
}

.message-time {
  font-size: 10px;
}

.message-status {
  font-size: 12px;
}

.status-read {
  color: #34B7F1;
}

.message-image {
  max-width: 250px;
  max-height: 200px;
  border-radius: 12px;
  margin-bottom: 6px;
  cursor: pointer;
}

/* Typing Bubble */
.typing-bubble {
  display: none;
  align-self: flex-start;
  background: var(--received-msg);
  padding: 12px 16px;
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  gap: 4px;
  margin-bottom: 8px;
}

.typing-dot {
  width: 6px;
  height: 6px;
  background: var(--text-secondary);
  border-radius: 50%;
  display: inline-block;
  animation: typing 1.4s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Input Area */
.input-area {
  padding: 12px 20px;
  background: var(--bg-surface-light);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.input-actions {
  display: flex;
  gap: 8px;
}

.input-action-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 22px;
  cursor: pointer;
  padding: 6px;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.input-action-btn:hover {
  background: rgba(255,255,255,0.1);
}

.message-input {
  flex: 1;
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 10px 16px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  resize: none;
  max-height: 100px;
}

.message-input:focus {
  border-color: var(--accent);
}

.send-btn {
  background: var(--accent);
  border: none;
  color: white;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.send-btn:hover {
  transform: scale(1.05);
  background: #128C7E;
}

/* Empty State */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--text-secondary);
  text-align: center;
  padding: 40px;
}

.empty-icon {
  font-size: 80px;
  opacity: 0.5;
}

.empty-text {
  font-size: 16px;
}

/* Mobile Responsive */
@media (max-width: 768px) {
  .sidebar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 100%;
    z-index: 10;
    transition: transform 0.3s;
  }
  
  .sidebar.hide {
    transform: translateX(-100%);
  }
  
  .main-chat {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 100%;
    z-index: 20;
    display: none;
  }
  
  .main-chat.show {
    display: flex;
  }
  
  .back-btn {
    display: flex;
  }
  
  .message {
    max-width: 85%;
  }
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: var(--bg-dark);
}

::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--text-muted);
}
</style>
</head>
<body>
<div class="app-container">
  <!-- Sidebar / Chats List -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <h1>Private Room</h1>
        <span>🔒 Invite-only</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="settingsBtn">⚙️</button>
        <button class="icon-btn" id="newChatBtn">✏️</button>
      </div>
    </div>
    
    <div class="user-bar" id="userBar">
      <div class="avatar online" id="userAvatar">
        <span id="userInitial">U</span>
      </div>
      <div class="user-info">
        <div class="user-name" id="userName">Your Name</div>
        <div class="user-status" id="userStatus">Online</div>
      </div>
      <div class="user-actions">
        <button class="icon-btn" id="statusBtn">💬</button>
        <button class="icon-btn" id="logoutBtn">🚪</button>
      </div>
    </div>
    
    <div class="search-bar">
      <div class="search-container">
        <span>🔍</span>
        <input type="text" placeholder="Search or start new chat" id="searchInput">
      </div>
    </div>
    
    <div class="chat-list" id="chatList">
      <!-- Chat items will be dynamically added here -->
      <div style="padding: 40px; text-align: center; color: var(--text-muted);">
        ✨ No conversations yet<br>
        <span style="font-size: 12px;">Share your invite code to connect</span>
      </div>
    </div>
  </div>
  
  <!-- Main Chat Area -->
  <div class="main-chat" id="mainChat">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🔒</div>
      <div class="empty-text">Select a chat to start messaging</div>
      <div style="font-size: 12px;">Your messages are private & encrypted</div>
    </div>
    
    <div id="activeChat" style="display: none; flex: 1; flex-direction: column; overflow: hidden;">
      <div class="chat-header">
        <button class="back-btn" id="backBtn">←</button>
        <div class="chat-header-avatar">
          <span id="chatAvatar">?</span>
          <div class="online-dot" id="chatOnlineDot" style="display: none;"></div>
        </div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatName">Contact Name</div>
          <div class="chat-header-status" id="chatStatus">Online</div>
        </div>
        <div class="chat-header-actions">
          <button class="icon-btn" id="callBtn">📞</button>
          <button class="icon-btn" id="videoBtn">📹</button>
          <button class="icon-btn" id="menuBtn">⋮</button>
        </div>
      </div>
      
      <div class="messages-area" id="messagesArea">
        <!-- Messages will appear here -->
      </div>
      
      <div class="typing-bubble" id="typingBubble">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
      
      <div class="input-area">
        <div class="input-actions">
          <button class="input-action-btn" id="attachBtn">📎</button>
          <button class="input-action-btn" id="emojiBtn">😊</button>
        </div>
        <textarea class="message-input" id="messageInput" rows="1" placeholder="Type a message..."></textarea>
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
// Sample data for demo - replace with your Firebase integration
const demoChats = [
  { id: 1, name: "Alex Morgan", lastMessage: "Hey! How are you?", time: "10:42 AM", unread: 2, online: true, typing: false, avatar: "A" },
  { id: 2, name: "Sarah Chen", lastMessage: "See you tomorrow 👋", time: "9:15 AM", unread: 0, online: false, typing: false, avatar: "S" },
  { id: 3, name: "Mike Johnson", lastMessage: "Thanks for the update", time: "Yesterday", unread: 0, online: true, typing: false, avatar: "M" },
  { id: 4, name: "Emily Davis", lastMessage: "Love the new design! 🔥", time: "Yesterday", unread: 3, online: true, typing: true, avatar: "E" }
];

const demoMessages = {
  1: [
    { text: "Hey! How are you?", sent: false, time: "10:41 AM", read: true },
    { text: "I'm good, thanks! Working on the new project.", sent: true, time: "10:42 AM", read: true },
    { text: "That sounds exciting! Need any help?", sent: false, time: "10:43 AM", read: true },
    { text: "Actually yes! Can you review this design?", sent: true, time: "10:44 AM", read: false }
  ],
  2: [
    { text: "Don't forget about the meeting at 3pm", sent: false, time: "9:10 AM", read: true },
    { text: "Got it, I'll be there!", sent: true, time: "9:15 AM", read: true }
  ],
  3: [
    { text: "Thanks for the update", sent: false, time: "Yesterday", read: true },
    { text: "No problem! Let me know if you need anything else", sent: true, time: "Yesterday", read: true }
  ],
  4: [
    { text: "Check out this new design!", sent: false, time: "Yesterday", read: true },
    { text: "Wow that looks amazing! 🔥", sent: true, time: "Yesterday", read: true },
    { text: "Love the new design! 🔥", sent: false, time: "Yesterday", read: false }
  ]
};

// Render chat list
function renderChatList() {
  const container = document.getElementById('chatList');
  container.innerHTML = demoChats.map(chat => `
    <div class="chat-item" data-chat-id="${chat.id}">
      <div class="chat-avatar">
        <div class="chat-avatar-img">${chat.avatar}</div>
        ${chat.online ? '<div class="online-dot"></div>' : ''}
      </div>
      <div class="chat-info">
        <div class="chat-name">${chat.name}</div>
        <div class="chat-preview ${chat.typing ? 'typing' : ''}">
          ${chat.typing ? '✍️ typing...' : (chat.lastMessage.length > 30 ? chat.lastMessage.substring(0, 30) + '...' : chat.lastMessage)}
        </div>
      </div>
      <div class="chat-meta">
        <div class="chat-time">${chat.time}</div>
        ${chat.unread > 0 ? `<div class="unread-badge">${chat.unread}</div>` : ''}
      </div>
    </div>
  `).join('');
  
  // Add click handlers
  document.querySelectorAll('.chat-item').forEach(item => {
    item.addEventListener('click', () => {
      const chatId = parseInt(item.dataset.chatId);
      openChat(chatId);
    });
  });
}

// Open chat
function openChat(chatId) {
  const chat = demoChats.find(c => c.id === chatId);
  if (!chat) return;
  
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('activeChat').style.display = 'flex';
  document.getElementById('mainChat').classList.add('show');
  
  // On mobile, hide sidebar
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.add('hide');
  }
  
  // Update header
  document.getElementById('chatName').textContent = chat.name;
  document.getElementById('chatAvatar').textContent = chat.avatar;
  const onlineDot = document.getElementById('chatOnlineDot');
  if (chat.online) {
    onlineDot.style.display = 'block';
    document.getElementById('chatStatus').textContent = 'Online';
  } else {
    onlineDot.style.display = 'none';
    document.getElementById('chatStatus').textContent = 'Offline';
  }
  
  // Load messages
  const messages = demoMessages[chatId] || [];
  const messagesContainer = document.getElementById('messagesArea');
  messagesContainer.innerHTML = messages.map(msg => `
    <div class="message ${msg.sent ? 'sent' : 'received'}">
      <div class="message-bubble">
        ${msg.text}
        <div class="message-meta">
          <span class="message-time">${msg.time}</span>
          ${msg.sent ? `<span class="message-status ${msg.read ? 'status-read' : ''}">${msg.read ? '✓✓' : '✓'}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
  
  messagesContainer.scrollTop = messagesContainer.scrollHeight;
  
  // Remove unread badge
  chat.unread = 0;
  renderChatList();
}

// Back button for mobile
document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('hide');
  document.getElementById('mainChat').classList.remove('show');
});

// Send message
document.getElementById('sendBtn').addEventListener('click', () => {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;
  
  // Add message to UI (demo)
  const messagesContainer = document.getElementById('messagesArea');
  const newMsg = document.createElement('div');
  newMsg.className = 'message sent';
  newMsg.innerHTML = `
    <div class="message-bubble">
      ${text}
      <div class="message-meta">
        <span class="message-time">Now</span>
        <span class="message-status">✓</span>
      </div>
    </div>
  `;
  messagesContainer.appendChild(newMsg);
  messagesContainer.scrollTop = messagesContainer.scrollHeight;
  input.value = '';
  
  // Simulate reply after 1 second
  setTimeout(() => {
    const reply = document.createElement('div');
    reply.className = 'message received';
    reply.innerHTML = `
      <div class="message-bubble">
        Thanks for your message! 🔒
        <div class="message-meta">
          <span class="message-time">Now</span>
        </div>
      </div>
    `;
    messagesContainer.appendChild(reply);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }, 1000);
});

// Enter to send
document.getElementById('messageInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('sendBtn').click();
  }
});

// Auto-resize textarea
document.getElementById('messageInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// Typing indicator simulation
let typingTimeout;
document.getElementById('messageInput').addEventListener('input', () => {
  const typingBubble = document.getElementById('typingBubble');
  const activeChat = document.querySelector('.chat-item.active');
  if (activeChat) {
    typingBubble.style.display = 'flex';
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      typingBubble.style.display = 'none';
    }, 1000);
  }
});

// Initialize
renderChatList();

// Handle window resize
window.addEventListener('resize', () => {
  if (window.innerWidth > 768) {
    document.getElementById('sidebar').classList.remove('hide');
    document.getElementById('mainChat').classList.remove('show');
  }
});
