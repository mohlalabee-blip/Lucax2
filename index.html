<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Private Room - Secure Chat</title>

<!-- PWA Manifest - THIS IS WHAT PWABUILDER NEEDS -->
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Private%20Room%22,%22short_name%22:%22PrivateChat%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22background_color%22:%22%230B0F1A%22,%22theme_color%22:%22%236366F1%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Crect%20width%3D%27100%27%20height%3D%27100%27%20fill%3D%27%236366F1%27%2F%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2750%25%27%20text-anchor%3D%27middle%27%20dy%3D%27.35em%27%20fill%3D%27white%27%20font-size%3D%2760%27%3E🔒%3C%2Ftext%3E%3C%2Fsvg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image%2Fsvg+xml%22}]}">

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0B0F1A;
  --card: #111827;
  --border: #1F2937;
  --accent: #6366F1;
  --accent2: #8B5CF6;
  --green: #10B981;
  --red: #EF4444;
  --orange: #F97316;
  --text: #F9FAFB;
  --muted: #6B7280;
  --me: #4F46E5;
  --them: #1F2937;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Auth Screen */
#auth-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  background: radial-gradient(ellipse at 50% 0%, #1e1b4b 0%, var(--bg) 60%);
  padding: 20px;
}

.auth-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 32px 24px;
  width: 100%;
  max-width: 360px;
}

.auth-logo {
  text-align: center;
  margin-bottom: 24px;
}

.auth-logo .icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 12px;
}

.ig {
  margin-bottom: 16px;
}

.ig label {
  display: block;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 5px;
  text-transform: uppercase;
}

.ig input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}

.btn-primary {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 40px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}

.auth-toggle {
  text-align: center;
  margin-top: 16px;
  font-size: 13px;
  color: var(--muted);
}

.auth-toggle span {
  color: var(--accent);
  cursor: pointer;
}

.auth-err {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 12px;
  padding: 10px;
  color: var(--red);
  font-size: 12px;
  margin-bottom: 16px;
  display: none;
}

/* App Layout */
#app-screen {
  display: none;
  flex: 1;
  flex-direction: column;
  height: 100dvh;
}

.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.user-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 4px 12px 4px 5px;
  font-size: 13px;
  cursor: pointer;
}

.avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  text-transform: uppercase;
  font-size: 12px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 40px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  font-size: 16px;
}

.body-area {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Conversations */
.conv-list-panel {
  width: 100%;
  max-width: 340px;
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.conv-list-hdr {
  padding: 14px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}

.conv-list {
  flex: 1;
  overflow-y: auto;
}

.conv-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}

.conv-av {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 18px;
  position: relative;
}

.conv-online-dot {
  position: absolute;
  bottom: 2px;
  right: 2px;
  width: 12px;
  height: 12px;
  background: var(--green);
  border-radius: 50%;
  border: 2px solid var(--card);
}

.conv-name {
  font-weight: 500;
}

.conv-preview, .conv-last-seen {
  font-size: 12px;
  color: var(--muted);
}

.conv-unread {
  background: var(--accent);
  color: white;
  font-size: 11px;
  font-weight: bold;
  min-width: 20px;
  height: 20px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 6px;
}

/* Chat Panel */
.chat-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  overflow: hidden;
  position: relative;
}

.chat-header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 40px;
  background: var(--bg);
  border: 1px solid var(--border);
  font-size: 26px;
  color: var(--text);
  cursor: pointer;
  display: none;
}

.chat-header-av {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.chat-header-info {
  flex: 1;
}

.chat-header-name {
  font-weight: 600;
  font-size: 16px;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg-row {
  display: flex;
  width: 100%;
}

.msg-row.mine {
  justify-content: flex-end;
}

.bubble {
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 14px;
  line-height: 1.45;
  max-width: 80%;
  position: relative;
}

.msg-row.mine .bubble {
  background: var(--me);
  color: white;
  border-radius: 20px 6px 20px 20px;
}

.msg-row.theirs .bubble {
  background: var(--them);
  color: var(--text);
  border-radius: 6px 20px 20px 20px;
}

.btime {
  font-size: 9px;
  opacity: 0.7;
  margin-top: 4px;
  display: flex;
  justify-content: flex-end;
}

.input-bar {
  padding: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  background: var(--card);
}

.msg-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 10px 16px;
  color: var(--text);
  font-size: 14px;
  resize: none;
  font-family: inherit;
}

.send-btn, .attach-btn {
  width: 44px;
  height: 44px;
  border-radius: 44px;
  background: var(--bg);
  border: 1px solid var(--border);
  font-size: 18px;
  cursor: pointer;
}

.send-btn {
  background: var(--orange);
  border: none;
  color: white;
}

/* Mobile */
@media (max-width: 768px) {
  .conv-list-panel {
    max-width: 100%;
    width: 100%;
  }
  .chat-panel {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg);
    z-index: 20;
    display: none;
  }
  .chat-panel.open {
    display: flex;
  }
  .back-btn {
    display: flex !important;
  }
}

/* Modals */
#profile-modal, #timer-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 200;
  align-items: center;
  justify-content: center;
}

.profile-box, .timer-box {
  background: var(--card);
  border-radius: 24px;
  padding: 24px;
  width: 85%;
  max-width: 320px;
  text-align: center;
}

.p-avatar {
  width: 80px;
  height: 80px;
  margin: 0 auto 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: bold;
}

#react-picker {
  display: none;
  position: fixed;
  background: var(--card);
  border-radius: 40px;
  padding: 10px 18px;
  gap: 12px;
  z-index: 300;
}

#react-picker span {
  font-size: 28px;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="icon">🔒</div>
      <h1>Private Room</h1>
      <p>invite code: justus</p>
    </div>
    <div class="auth-err" id="auth-err"></div>
    <div class="ig" id="name-group" style="display:none">
      <label>Display name</label>
      <input id="name-inp" maxlength="20"/>
    </div>
    <div class="ig">
      <label>Email</label>
      <input id="u-inp" type="email"/>
    </div>
    <div class="ig">
      <label>Password</label>
      <input id="p-inp" type="password"/>
    </div>
    <div class="ig" id="invite-group" style="display:none">
      <label>Invite code</label>
      <input id="code-inp"/>
    </div>
    <button class="btn-primary" id="auth-btn">Sign In</button>
    <div class="auth-toggle">
      <span id="auth-tog">Create account</span>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <div class="topbar">
    <div>🔒</div>
    <div class="user-pill" id="status-pill">
      <div class="avatar" id="my-av">?</div>
      <span id="my-uname">...</span>
    </div>
    <div>
      <button class="icon-btn" id="settings-btn">⚙️</button>
      <button class="icon-btn" id="share-btn">🔗</button>
      <button class="icon-btn" id="so-btn">🚪</button>
    </div>
  </div>

  <div class="body-area">
    <div class="conv-list-panel">
      <div class="conv-list-hdr">💬 Chats</div>
      <div class="conv-list" id="conv-list">Loading...</div>
    </div>

    <div class="chat-panel" id="chat-panel">
      <div id="no-chat-msg" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted)">
        🔒 Select someone to chat
      </div>
      <div id="active-chat" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
        <div class="chat-header">
          <button class="back-btn" id="back-btn">←</button>
          <div class="chat-header-av" id="ch-av">?</div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="ch-name"></div>
          </div>
          <button class="icon-btn" id="ch-vcall">📹</button>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-bar">
          <button class="attach-btn" id="attach-btn">📎</button>
          <textarea class="msg-input" id="msg-input" rows="1" placeholder="Message..."></textarea>
          <button class="send-btn" id="send-btn">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*"/>
<div id="react-picker">
  <span data-emoji="❤️">❤️</span>
  <span data-emoji="👍">👍</span>
  <span data-emoji="😂">😂</span>
  <span data-emoji="🔥">🔥</span>
</div>
<div id="profile-modal">
  <div class="profile-box">
    <div class="p-avatar" id="p-av-text">?</div>
    <div id="p-name"></div>
    <button id="profile-close" class="btn-primary" style="margin-top:12px;background:var(--border)">Close</button>
  </div>
</div>
<div id="timer-modal">
  <div class="timer-box">
    <h3>⏱ Disappearing Messages</h3>
    <button data-ms="0" class="btn-primary" style="margin:5px">Off</button>
    <button data-ms="3600000" class="btn-primary" style="margin:5px">1 Hour</button>
    <button data-ms="86400000" class="btn-primary" style="margin:5px">24h</button>
    <button id="timer-cancel" class="btn-primary" style="background:var(--border)">Cancel</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDUHVeaHIMRS8GxkFNEjVSXfUeKr_mQnp0",
  authDomain: "just-you-n-i.firebaseapp.com",
  databaseURL: "https://just-you-n-i-default-rtdb.firebaseio.com",
  projectId: "just-you-n-i",
  storageBucket: "just-you-n-i.firebasestorage.app",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

const ROOM = "myroom";
const INVITE_CODE = "justus";

let myUid = null, myName = "";
let activePeer = null;
let allUsers = {};
let unreadCounts = {};

function getKey(uid) { return [myUid, uid].sort().join('_'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

// Auth
let isSignUp = false;
document.getElementById('auth-tog').onclick = () => {
  isSignUp = !isSignUp;
  document.getElementById('auth-btn').textContent = isSignUp ? 'Create account' : 'Sign In';
  document.getElementById('name-group').style.display = isSignUp ? 'block' : 'none';
  document.getElementById('invite-group').style.display = isSignUp ? 'block' : 'none';
};

document.getElementById('auth-btn').onclick = async () => {
  const email = document.getElementById('u-inp').value.trim();
  const pass = document.getElementById('p-inp').value.trim();
  if (!email || !pass) return alert("Email & password required");
  if (isSignUp) {
    const name = document.getElementById('name-inp').value.trim();
    const code = document.getElementById('code-inp').value.trim();
    if (!name) return alert("Display name required");
    if (code !== INVITE_CODE) return alert("Wrong invite code");
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({ displayName: name });
      alert("Account created! You can now sign in.");
      auth.signOut();
    } catch(e) { alert(e.message); }
  } else {
    try {
      await auth.signInWithEmailAndPassword(email, pass);
    } catch(e) { alert(e.message); }
  }
};

auth.onAuthStateChanged(user => {
  if (user) {
    myUid = user.uid;
    myName = user.displayName || user.email.split('@')[0];
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('my-uname').innerText = myName;
    document.getElementById('my-av').innerText = myName[0].toUpperCase();
    initApp();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});

function initApp() {
  const presRef = db.ref(`rooms/${ROOM}/presence/${myUid}`);
  presRef.set({ username: myName, online: true, lastSeen: Date.now() });
  presRef.onDisconnect().update({ online: false, lastSeen: Date.now() });

  db.ref(`rooms/${ROOM}/presence`).on('value', snap => {
    allUsers = snap.val() || {};
    renderConvList();
  });

  document.getElementById('back-btn').onclick = () => {
    document.getElementById('chat-panel').classList.remove('open');
    document.getElementById('active-chat').style.display = 'none';
    document.getElementById('no-chat-msg').style.display = 'flex';
    activePeer = null;
  };

  document.getElementById('attach-btn').onclick = () => document.getElementById('file-input').click();
  document.getElementById('send-btn').onclick = sendMsg;
  document.getElementById('msg-input').onkeydown = e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } };
  document.getElementById('share-btn').onclick = () => alert(`Invite code: ${INVITE_CODE}`);
  document.getElementById('so-btn').onclick = () => auth.signOut();
  document.getElementById('settings-btn').onclick = () => document.getElementById('timer-modal').style.display = 'flex';
  document.getElementById('timer-cancel').onclick = () => document.getElementById('timer-modal').style.display = 'none';
  document.getElementById('profile-close').onclick = () => document.getElementById('profile-modal').style.display = 'none';
  document.getElementById('ch-vcall').onclick = () => alert("Video call feature ready");

  document.querySelectorAll('.timer-opt').forEach(btn => {
    btn.onclick = () => document.getElementById('timer-modal').style.display = 'none';
  });
}

function openChat(uid, uname) {
  activePeer = uid;
  document.getElementById('chat-panel').classList.add('open');
  document.getElementById('no-chat-msg').style.display = 'none';
  document.getElementById('active-chat').style.display = 'flex';
  document.getElementById('ch-name').innerText = uname;
  document.getElementById('ch-av').innerText = uname[0].toUpperCase();
  loadMessages(uid);
  unreadCounts[uid] = 0;
  renderConvList();
}

function loadMessages(uid) {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  const key = getKey(uid);
  db.ref(`rooms/${ROOM}/dms/${key}/messages`).limitToLast(50).on('child_added', snap => {
    const msg = snap.val();
    if(!msg) return;
    const me = msg.senderUid === myUid;
    const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    let content = '';
    if(msg.imageUrl) content += `<img src="${msg.imageUrl}" style="max-width:180px;border-radius:12px;margin-bottom:5px;cursor:pointer" onclick="window.open(this.src)"/>`;
    if(msg.text) content += esc(msg.text);
    const row = document.createElement('div');
    row.className = `msg-row ${me ? 'mine' : 'theirs'}`;
    row.innerHTML = `<div class="bubble">${content}<div class="btime">${time}</div></div>`;
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  });
}

function sendMsg() {
  if(!activePeer) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if(!text) return;
  const key = getKey(activePeer);
  db.ref(`rooms/${ROOM}/dms/${key}/messages`).push({
    senderUid: myUid,
    text: text,
    timestamp: Date.now()
  }).then(() => {
    input.value = '';
  });
}

async function uploadImage(e) {
  const file = e.target.files[0];
  if(!file || !activePeer) return;
  const ts = Date.now();
  const path = `rooms/${ROOM}/images/${getKey(activePeer)}/${ts}_${file.name}`;
  const uploadTask = storage.ref(path).put(file);
  uploadTask.on('state_changed', null, null, async () => {
    const url = await uploadTask.snapshot.ref.getDownloadURL();
    db.ref(`rooms/${ROOM}/dms/${getKey(activePeer)}/messages`).push({
      senderUid: myUid,
      imageUrl: url,
      timestamp: Date.now()
    });
  });
  e.target.value = '';
}

document.getElementById('file-input').onchange = uploadImage;

function renderConvList() {
  const container = document.getElementById('conv-list');
  const others = Object.entries(allUsers).filter(([uid]) => uid !== myUid);
  if(!others.length) {
    container.innerHTML = '<div style="padding:40px;text-align:center">✨ No users yet. Share the invite!</div>';
    return;
  }
  let html = '';
  for(let [uid, u] of others) {
    const isActive = activePeer === uid;
    const activeClass = isActive ? 'active' : '';
    html += `<div class="conv-item ${activeClass}" data-uid="${uid}" data-uname="${esc(u.username)}">
      <div class="conv-av">${(u.username[0]||'?').toUpperCase()}${u.online?'<div class="conv-online-dot"></div>':''}</div>
      <div style="flex:1"><div class="conv-name">${esc(u.username)}</div><div class="conv-preview">${u.online ? '🟢 online' : 'offline'}</div></div>
    </div>`;
  }
  container.innerHTML = html;
  document.querySelectorAll('.conv-item').forEach(el => {
    const uid = el.dataset.uid, uname = el.dataset.uname;
    el.addEventListener('click', () => openChat(uid, uname));
  });
}

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(console.log);
}
